version: "2"
sql:
  - engine: postgresql
    schema: "db/migrations"
    queries: "internal/db/query"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
