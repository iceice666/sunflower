{{define "content"}}
<header class="top">
  <h1>Now Playing</h1>
</header>
<table data-poll="/api/v1/admin/now-playing">
  <thead><tr><th>Device</th><th>Track</th><th>Position</th><th>State</th><th>Command</th></tr></thead>
  <tbody>
  {{range .NowPlaying}}
    <tr>
      <td><code>{{.DeviceID}}</code></td>
      <td>{{.Title}}<br><span class="muted">{{.Artist}}</span></td>
      <td>{{.PositionMs}} / {{.DurationMs}} ms</td>
      <td>{{if .IsPlaying}}playing{{else}}paused{{end}}</td>
      <td class="actions">
        <form method="post" action="/admin/now-playing/command">
          <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
          <input type="hidden" name="device_id" value="{{.DeviceID}}">
          <button name="command" value="play" type="submit">Play</button>
          <button name="command" value="pause" type="submit">Pause</button>
          <button name="command" value="skip_prev" type="submit">Prev</button>
          <button name="command" value="skip_next" type="submit">Next</button>
        </form>
      </td>
    </tr>
  {{else}}
    <tr><td colspan="5" class="muted">No active playback.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
