name: client-verify

on:
  pull_request:
    paths:
      - 'client/**'
      - 'rust/**'
      - 'justfile'
      - 'flake.nix'
      - 'flake.lock'
      - 'scripts/**'
      - 'plans/**'
      - '.github/workflows/client-verify.yml'
  schedule:
    # Nightly at 02:00 UTC — Android emulator smoke only
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_smoke:
        description: 'Run Android emulator smoke (nightly job)'
        required: false
        default: 'false'
        type: boolean

# Cancel superseded PR runs; keep nightly runs independent.
concurrency:
  group: client-verify-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FLUTTER_VERSION: '3.41.9'
  JAVA_VERSION: '17'
  RUST_VERSION: '1.95.0'
  SUNFLOWER_SETUP_TOKEN: 'sunflower-ci-setup-token'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Rust parity tests (every PR, Postgres service)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  rust-parity:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Rust parity tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sunflower
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sunflower"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres@localhost:5432/sunflower?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_VERSION}"
          rustc --version

      - name: Check Rust formatting
        run: cd rust && cargo fmt --all -- --check

      - name: Run Rust workspace tests
        run: cd rust && cargo test --workspace --locked

      - name: Run Postgres-backed Rust parity tests
        run: |
          cd rust
          export SUNFLOWER_RUN_PG_TESTS=1
          cargo test --locked -p sunflower-storage-postgres -- --nocapture
          cargo test --locked -p sunflower-server -- --nocapture

      - name: Run Rust clippy
        run: cd rust && cargo clippy --workspace --locked --all-targets -- -D warnings

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Golden tests (every PR, macOS, no emulator)
# ─────────────────────────────────────────────────────────────────────────────
  golden-tests:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Flutter golden tests
    runs-on: macos-14
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner (codegen — Drift, mockito)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # flutter_lints is now wired; run analyze so lint regressions surface on
      # PRs. continue-on-error while the initial lint backlog is triaged.
      - name: Flutter analyze
        run: flutter analyze
        continue-on-error: true

      - name: Run Dart unit tests (non-golden)
        run: flutter test test/ --exclude-tags golden --reporter=expanded

      - name: Run golden tests
        run: flutter test test/goldens/ --reporter=expanded

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures-${{ github.sha }}
          path: client/test/goldens/failures/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Android emulator smoke (nightly + manual dispatch)
# Runs visual_smoke_test.dart against a live AVD; uploads screenshots.
# ─────────────────────────────────────────────────────────────────────────────
  android-smoke:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_smoke)
    name: Android emulator smoke (nightly)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sunflower
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sunflower"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal
          rustup default "${RUST_VERSION}"
          rustc --version

      - name: Install just
        run: |
          cargo install just --locked
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          just --version

      - name: Export database URL
        run: echo "DATABASE_URL=postgres://postgres@localhost:5432/sunflower?sslmode=disable" >> "$GITHUB_ENV"

      - name: Start sunflowerd
        run: |
          mkdir -p "$RUNNER_TEMP/sunflower-data"
          (cd rust && DATA_DIR="$RUNNER_TEMP/sunflower-data" cargo run --locked -p sunflower-server --bin sunflowerd-rs) &
          for i in {1..180}; do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then exit 0; fi
            sleep 1
          done
          exit 1

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Run build_runner
        working-directory: client
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android debug APK (pre-warm Gradle cache)
        working-directory: client
        run: flutter build apk --debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android emulator smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          avd-name: Pixel_6_API33_X64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: just seed-demo && just smoke-android

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-${{ github.run_id }}
          path: client/build/smoke-artifacts/
          retention-days: 30
